<!DOCTYPE html>
<html>
<head>
  <title>APSC Presentation Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6;}
    .sidebar { width: 450px; background: #2c3e50; color: white; padding: 20px; overflow-y: auto;}
    .main { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px;}
    h1 { margin-top: 0; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; font-size: 24px;}
    .stat-box { background: #34495e; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #3498db;}
    .val { font-size: 1.05em; font-weight: bold; display: block; margin-top: 5px;}
    .chart-container { background: white; padding: 10px; border-radius: 8px; margin-bottom: 15px;}
    .explainer { font-size: 0.85em; color: #bdc3c7; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>Algorithm Execution Stats</h1>
    <p class="explainer">Red = Initial State / Data Load Time<br>Blue = Final State / Total Run Time</p>
    
    <div class="stat-box">Area Details
        <span class="val" style="color:#f1c40f">Input Area: 9.210000e+05</span>
        <span class="val" style="color:#f1c40f">Output Area: 9.210000e+05</span>
        <span class="val" style="color:#e74c3c">Displacement: 4.720594e+04</span>
    </div>

    <div class="chart-container" id="geom_chart"></div>
    <div class="chart-container" id="perf_chart"></div>
    <div class="chart-container" id="err_chart"></div>
  </div>
  
  <div class="main"><div id="vis"></div></div>
  
  <script>
    const origData = [{"order":0,"ring_id":"0","x":0.0,"y":0.0},{"order":1,"ring_id":"0","x":200.0,"y":-50.0},{"order":2,"ring_id":"0","x":400.0,"y":0.0},{"order":3,"ring_id":"0","x":600.0,"y":-30.0},{"order":4,"ring_id":"0","x":800.0,"y":0.0},{"order":5,"ring_id":"0","x":1000.0,"y":50.0},{"order":6,"ring_id":"0","x":1200.0,"y":0.0},{"order":7,"ring_id":"0","x":1250.0,"y":200.0},{"order":8,"ring_id":"0","x":1200.0,"y":400.0},{"order":9,"ring_id":"0","x":1250.0,"y":600.0},{"order":10,"ring_id":"0","x":1100.0,"y":750.0},{"order":11,"ring_id":"0","x":900.0,"y":850.0},{"order":12,"ring_id":"0","x":700.0,"y":900.0},{"order":13,"ring_id":"0","x":500.0,"y":1000.0},{"order":14,"ring_id":"0","x":300.0,"y":950.0},{"order":15,"ring_id":"0","x":150.0,"y":800.0},{"order":16,"ring_id":"0","x":50.0,"y":650.0},{"order":17,"ring_id":"0","x":0.0,"y":500.0},{"order":18,"ring_id":"0","x":-50.0,"y":300.0},{"order":19,"ring_id":"0","x":0.0,"y":150.0},{"order":20,"ring_id":"0","x":0.0,"y":0.0},{"order":0,"ring_id":"1","x":200.0,"y":200.0},{"order":1,"ring_id":"1","x":200.0,"y":350.0},{"order":2,"ring_id":"1","x":300.0,"y":450.0},{"order":3,"ring_id":"1","x":450.0,"y":400.0},{"order":4,"ring_id":"1","x":450.0,"y":300.0},{"order":5,"ring_id":"1","x":400.0,"y":200.0},{"order":6,"ring_id":"1","x":300.0,"y":150.0},{"order":7,"ring_id":"1","x":200.0,"y":200.0},{"order":0,"ring_id":"2","x":700.0,"y":300.0},{"order":1,"ring_id":"2","x":750.0,"y":350.0},{"order":2,"ring_id":"2","x":850.0,"y":500.0},{"order":3,"ring_id":"2","x":950.0,"y":650.0},{"order":4,"ring_id":"2","x":1000.0,"y":600.0},{"order":5,"ring_id":"2","x":1050.0,"y":450.0},{"order":6,"ring_id":"2","x":1000.0,"y":350.0},{"order":7,"ring_id":"2","x":900.0,"y":250.0},{"order":8,"ring_id":"2","x":800.0,"y":200.0},{"order":9,"ring_id":"2","x":700.0,"y":300.0}];
    const simpData = [{"order":0,"ring_id":"0","x":0.0,"y":33.87096774193549},{"order":1,"ring_id":"0","x":274.8114630467572,"y":-31.297134238310708},{"order":2,"ring_id":"0","x":600.0,"y":-30.0},{"order":3,"ring_id":"0","x":966.6666666666667,"y":41.66666666666667},{"order":4,"ring_id":"0","x":1200.0,"y":0.0},{"order":5,"ring_id":"0","x":1250.0,"y":200.0},{"order":6,"ring_id":"0","x":1200.0,"y":400.0},{"order":7,"ring_id":"0","x":1250.0,"y":600.0},{"order":8,"ring_id":"0","x":1100.0,"y":750.0},{"order":9,"ring_id":"0","x":500.0,"y":1000.0},{"order":10,"ring_id":"0","x":300.0,"y":950.0},{"order":11,"ring_id":"0","x":150.0,"y":800.0},{"order":12,"ring_id":"0","x":50.0,"y":650.0},{"order":13,"ring_id":"0","x":-58.333333333333336,"y":266.66666666666663},{"order":14,"ring_id":"0","x":0.0,"y":33.87096774193549},{"order":0,"ring_id":"1","x":200.0,"y":200.0},{"order":1,"ring_id":"1","x":200.0,"y":350.0},{"order":2,"ring_id":"1","x":300.0,"y":450.0},{"order":3,"ring_id":"1","x":450.0,"y":450.0},{"order":4,"ring_id":"1","x":400.0,"y":200.0},{"order":5,"ring_id":"1","x":300.0,"y":150.0},{"order":6,"ring_id":"1","x":200.0,"y":200.0},{"order":0,"ring_id":"2","x":716.6666666666666,"y":316.6666666666667},{"order":1,"ring_id":"2","x":950.0,"y":650.0},{"order":2,"ring_id":"2","x":1083.3333333333333,"y":516.6666666666666},{"order":3,"ring_id":"2","x":900.0,"y":250.0},{"order":4,"ring_id":"2","x":800.0,"y":200.0},{"order":5,"ring_id":"2","x":716.6666666666666,"y":316.6666666666667}];
    const geomData = [{"category":"Vertices","type":"Initial","value":36},{"category":"Vertices","type":"Final","value":25}];
    const perfData = [{"category":"Time (s)","type":"Initial","value":0.002797847},{"category":"Time (s)","type":"Final","value":0.00286945},{"category":"Peak Mem (KB)","type":"Initial","value":3200},{"category":"Peak Mem (KB)","type":"Final","value":3584}];
    const errData = [{"category":"Areal Displacement","type":"Initial","value":0.0},{"category":"Areal Displacement","type":"Final","value":47205.94317131318}];

    vegaEmbed('#vis', {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "width": 650, "height": 650, 
      "title": {"text": "Shape Overlay", "subtitle": "Red Glow = Initial Shape | Blue Dashed = Simplified Polygon"},
      "layer": [
        {
          "data": {"values": origData},
          "mark": {"type": "line", "point": {"size": 10, "color": "#e74c3c"}, "color": "#e74c3c", "strokeWidth": 7, "opacity": 1.0},
          "encoding": {
            "x": {"field": "x", "type": "quantitative", "scale": {"zero": false}},
            "y": {"field": "y", "type": "quantitative", "scale": {"zero": false}},
            "order": {"field": "order", "type": "quantitative"},
            "detail": {"field": "ring_id"}
          }
        },
        {
          "data": {"values": simpData},
          "mark": {"type": "line", "point": {"size": 20, "color": "#2980b9"}, "color": "#113f60", "strokeWidth": 2, "opacity": 1.0, "strokeDash": [6, 4]},
          "encoding": {
            "x": {"field": "x", "type": "quantitative", "scale": {"zero": false}},
            "y": {"field": "y", "type": "quantitative", "scale": {"zero": false}},
            "detail": {"field": "ring_id"},
            "order": {"field": "order", "type": "quantitative"}
          }
        }
      ]
    });

    vegaEmbed('#geom_chart', {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "data": {"values": geomData},
      "facet": {"field": "category", "type": "nominal", "header": {"title": null}},
      "spec": {
        "width": 100, "height": 70,
        "layer": [
          {"mark": {"type": "bar", "cornerRadiusEnd": 4}},
          {"mark": {"type": "text", "align": "center", "baseline": "bottom", "dy": -3, "fontSize": 11, "color": "black"}, "encoding": {"text": {"field": "value", "type": "quantitative", "format": ".3g"}}}
        ],
        "encoding": {
          "x": {"field": "type", "type": "nominal", "axis": {"title": "", "labels": false, "ticks": false}},
          "y": {"field": "value", "type": "quantitative", "axis": {"title": "Count"}},
          "color": {"field": "type", "type": "nominal", "scale": {"domain": ["Initial", "Final"], "range": ["#e74c3c", "#3498db"]}, "legend": {"title": "State", "orient": "bottom"}}
        }
      },
      "resolve": {"scale": {"y": "independent"}}
    });

    // FIX: Added text layer to print exact values on top of the bars
    vegaEmbed('#perf_chart', {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "description": "Comparison of Loading vs Processing",
      "data": {"values": perfData},
      "facet": {"field": "category", "type": "nominal", "header": {"title": null}},
      "spec": {
        "width": 100, "height": 80,
        "layer": [
          {"mark": {"type": "bar", "cornerRadiusEnd": 4}},
          {"mark": {"type": "text", "align": "center", "baseline": "bottom", "dy": -2, "fontSize": 10, "color": "black"}, 
           "encoding": {"text": {"field": "value", "type": "quantitative", "format": ".3g"}}}
        ],
        "encoding": {
          "x": {"field": "type", "type": "nominal", "axis": {"title": null, "labelAngle": 0}},
          "y": {"field": "value", "type": "quantitative", "axis": {"title": null}},
          "color": {
            "field": "type", "type": "nominal", 
            "scale": {"domain": ["Initial", "Final"], "range": ["#e74c3c", "#3498db"]},
            "legend": null
          }
        }
      },
      "resolve": {"scale": {"y": "independent"}}
    });

    vegaEmbed('#err_chart', {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "width": 300, "height": 50, "title": "Accuracy Penalty",
      "data": {"values": errData},
      "layer": [
        {"mark": {"type": "bar", "cornerRadiusEnd": 4}},
        {"mark": {"type": "text", "align": "left", "baseline": "middle", "dx": 5, "fontSize": 11, "color": "black"}, "encoding": {"text": {"field": "value", "type": "quantitative", "format": ".3e"}}}
      ],
      "encoding": {
        "x": {"field": "value", "type": "quantitative", "axis": {"title": "Total Areal Displacement"}},
        "y": {"field": "type", "type": "nominal", "axis": {"title": ""}},
        "color": {"field": "type", "type": "nominal", "scale": {"domain": ["Initial", "Final"], "range": ["#e74c3c", "#3498db"]}, "legend": null}
      }
    });
  </script>
</body>
</html>
